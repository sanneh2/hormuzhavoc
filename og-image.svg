<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title>Hormuz Havoc Open Graph image</title>
  <desc>Retro-styled lobby screen for Hormuz Havoc with a gold-framed navy panel and arcade text.</desc>
  <defs>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#226f91"/>
      <stop offset="100%" stop-color="#1a5c79"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c79b3d"/>
      <stop offset="50%" stop-color="#d7b15f"/>
      <stop offset="100%" stop-color="#c79b3d"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#041f3d"/>
      <stop offset="100%" stop-color="#07172d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#000814" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 700 50px Georgia, 'Times New Roman', serif; letter-spacing: 1px; fill: #efc84a; }
      .copy { font: 26px 'Courier New', monospace; fill: #d7e2ef; }
      .hint { font: 700 28px 'Courier New', monospace; fill: #9eefad; }
      .cta { font: 700 40px 'Courier New', monospace; fill: #e6e9ee; }
      .small { font: 700 24px 'Courier New', monospace; fill: #efc84a; letter-spacing: 3px; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="#02163a"/>
  <rect x="168" y="0" width="105" height="630" fill="#c79b3d"/>
  <rect x="927" y="0" width="105" height="630" fill="#c79b3d"/>
  <rect x="240" y="0" width="720" height="630" fill="url(#frame)"/>
  <rect x="274" y="0" width="652" height="630" fill="url(#sea)"/>

  <g opacity="0.18" stroke="#65b5d5" stroke-width="4">
    <line x1="360" y1="24" x2="840" y2="24"/>
    <line x1="282" y1="70" x2="918" y2="70"/>
    <line x1="332" y1="100" x2="820" y2="100"/>
    <line x1="282" y1="548" x2="918" y2="548"/>
    <line x1="330" y1="594" x2="820" y2="594"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="220" y="123" width="760" height="402" rx="28" fill="#efc84a"/>
    <rect x="226" y="129" width="748" height="390" rx="26" fill="#202732"/>
    <rect x="258" y="156" width="684" height="336" rx="14" fill="url(#panel)"/>
  </g>

  <g opacity="0.08" stroke="#2c7ea3" stroke-width="2">
    <line x1="318" y1="202" x2="882" y2="202"/>
    <line x1="318" y1="236" x2="882" y2="236"/>
    <line x1="318" y1="370" x2="882" y2="370"/>
    <line x1="318" y1="436" x2="882" y2="436"/>
  </g>

  <text x="300" y="260" font-size="42" fill="#52b8ff">⚓</text>
  <text x="900" y="260" font-size="42" fill="#52b8ff">⚓</text>
  <text class="title" x="600" y="256" text-anchor="middle">HORMUZ HAVOC</text>

  <text class="copy" x="600" y="312" text-anchor="middle">Navigate the Strait of Hormuz</text>
  <text class="copy" x="600" y="358" text-anchor="middle">Avoid mines, rockets &amp; speedboats</text>
  <text class="copy" x="600" y="404" text-anchor="middle">Collect oil barrels, cash &amp; nav bonuses!</text>

  <text class="hint" x="600" y="468" text-anchor="middle">← / → or A / D to steer</text>
  <text class="cta" x="600" y="555" text-anchor="middle">PLAY IN YOUR BROWSER</text>
  <text class="small" x="600" y="593" text-anchor="middle">ARCADE SURVIVAL ACTION</text>
</svg>